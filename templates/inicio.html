    <h1>Inicio de Sesión</h1>
        <div class="container">
            <h2>Accede a tu Cuenta.</h2>
            <form action="#" method="post" class="form-login">
            <p>
            <div class="correo">
                <label for="correo">Correo Electrónico</label>
                <input type="varchar" id="correo" name="correo" placeholder="Ingresa Correo" requered>
            </p>

            <p>
            <div class="contraseña">
                <label for="id_usuarios">Contraseña</label> 
                <input type="varchar" id="id_usuarios" name="id_usuarios" placeholder="Ingresa Contraseña" required>
            </p>

            <p><input type="submit" value="Ingresar"></p>

            <p>¿No tienes una cuenta?</p>
            <p><button><a href="/registro">Registrarse.</a></button></p>
            </form>
        </div>
