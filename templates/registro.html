<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de datos</title>
    <link rel="stylesheet" href="../static/css/registro.css">
</head>
<body>
    <nav class="menú">
        <p><a href="/">PÁGINA PRINCIPAL</a></p>
        <p><a href="/acerca">ACERCA DE</a></p>
        <p><a href="/dep">DEPARTAMENTOS</a></p>
        <p><a href="/seguros">SEGUROS</a></p>
        <p><a href="/contactos">CONTACTOS</a></p>
    </nav>
    <h1>Registro</h1>
        <div class="container">  
        <h2>Completa el registro.</h2> 
        <div id="alerta" class="message"></div> 
        <form id="contactForm">
            <label for="id_usuarios">Número de Identificación</label> 
            <input type="integer" id="id_usuarios" name="id_usuarios" placeholder="Ingresa Identificación" required>

            <label for="nombre">Nombre</label>
            <input type="varchar" id="nombre" name="nombre" placeholder="Ingresa Nombre"required>
            
            <label for="apellido">Apellido</label>
            <input type="varchar" id="apellido" name="apellido" placeholder="Ingresa Apellido" required>
            
            <label for="direccion">Dirección</label>
            <input type="varchar" id="direccion" name="direccion" placeholder="Ingresa Dirección" required>

            <label for="telefono">Teléfono</label>
            <input type="varchar" name="telefono" name="telefono" placeholder="Ingresa Teléfono" required>

            <label for="correo">Correo Electrónico</label>
            <input type="varchar" id="correo" name="correo" placeholder="Ingresa Correo" requered>

            <label for="mensaje">Mensaje</label>
            <textarea type="varchar" id="mensaje" name="mensaje" placeholder="Ingresa un Mensaje(No es Obligatorio)"></textarea>
            
            
            <button type="submit">Enviar</button>

            <p>¿Ya tienes una cuenta?</p>

            <p><button><a href="/inicio">Inicia Sesión.</a></button></p>
            
        </form>
    </div>
</body>
</html>
